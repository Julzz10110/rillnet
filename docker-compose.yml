version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=rillnet
      - POSTGRES_USER=rillnet
      - POSTGRES_PASSWORD=rillnet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rillnet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rillnet -d rillnet"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - rillnet-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Web Interface
  rillnet-web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./web/public:/usr/share/nginx/html
      - ./web/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - rillnet-network
    restart: unless-stopped
    depends_on:
      - rillnet-ingest
      - rillnet-signal

  rillnet-ingest:
    build:
      context: .
      dockerfile: deployments/docker/ingest.Dockerfile
    ports:
      - "8080:8080"
      - "50000-50200:50000-50200/udp"
    environment:
      - RILLNET_CONFIG_PATH=/root/configs/config.yaml
      - RILLNET_LOG_LEVEL=debug
      - RILLNET_SERVER_ADDRESS=:8080
      - RILLNET_REDIS_ENABLED=true
      - RILLNET_REDIS_ADDRESS=redis:6379
      - RILLNET_DB_ENABLED=true
      - RILLNET_DB_DSN=postgres://rillnet:rillnet@postgres:5432/rillnet?sslmode=disable
      - RILLNET_JWT_SECRET=dev-docker-compose-secret-change-in-production
      - RILLNET_WEB_SERVER=http://rillnet-web
    volumes:
      - ./configs/config.dev.yaml:/root/configs/config.yaml:ro
    networks:
      - rillnet-network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  rillnet-signal:
    build:
      context: .
      dockerfile: deployments/docker/signal.Dockerfile
    ports:
      - "8081:8081"
    environment:
      - RILLNET_CONFIG_PATH=/root/configs/config.yaml
      - RILLNET_LOG_LEVEL=debug
      - RILLNET_SIGNAL_ADDRESS=:8081
      - RILLNET_REDIS_ENABLED=true
      - RILLNET_REDIS_ADDRESS=redis:6379
      - RILLNET_JWT_SECRET=dev-docker-compose-secret-change-in-production
      - RILLNET_WEB_SERVER=http://rillnet-web
    volumes:
      - ./configs/config.dev.yaml:/root/configs/config.yaml:ro
    networks:
      - rillnet-network
    depends_on:
      redis:
        condition: service_healthy
      rillnet-ingest:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # TURN server (required for reliable WebRTC across NAT)
  coturn:
    image: coturn/coturn:latest
    command:
      - -n
      - --log-file=stdout
      - --min-port=49160
      - --max-port=49200
      - --lt-cred-mech
      - --fingerprint
      - --realm=rillnet.local
      - --user=dev:devpass
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "49160-49200:49160-49200/udp"
    networks:
      - rillnet-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - rillnet-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./deployments/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - rillnet-network
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  rillnet-network:
    driver: bridge
