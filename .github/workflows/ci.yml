name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Run unit tests
      run: go test ./pkg/... ./internal/... -v -race -coverprofile=coverage-unit.out -count=1

    # tests/unit/{services,signal,webrtc} are out of date with current APIs — tracked for repair
    - name: Run integration tests
      env:
        RILLNET_REDIS_ENABLED: "true"
        RILLNET_REDIS_ADDRESS: localhost:6379
      run: go test ./tests/integration/... ./tests/unit/config/... -v -timeout 10m -count=1

    - name: Coverage summary
      run: go tool cover -func=coverage-unit.out | tail -1

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage-unit.out
        flags: unittests
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Build binaries
      run: |
        go build -o bin/ingest-server ./cmd/ingest
        go build -o bin/signal-server ./cmd/signal

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: bin/

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.5.0

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Gosec Security Scanner
      uses: securego/gosec@master
      with:
        args: './...'
