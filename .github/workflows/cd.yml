# CD is disabled (registry + deploy). Push/tag triggers removed so CI
# does not fail on missing DOCKER_* secrets.

name: CD

on:
  workflow_dispatch:

jobs:
  disabled-notice:
    runs-on: ubuntu-latest
    steps:
      - name: CD not active
        run: |
          echo "CD is disabled. Use docker compose locally (docs/LOCAL_SETUP.md)."
          echo "When ready: add registry login, fix image paths under deployments/docker/, then restore push/tags triggers."

