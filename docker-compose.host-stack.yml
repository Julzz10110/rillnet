# Minimal stack for host ingest: Redis + nginx + signal (no ingest container).
# Usage: scripts/dev-host-ingest.ps1

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rillnet-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rillnet-web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./web/public:/usr/share/nginx/html
      - ./web/nginx.host-ingest.conf:/etc/nginx/nginx.conf:ro
    networks:
      - rillnet-network
    restart: unless-stopped
    depends_on:
      rillnet-signal:
        condition: service_started

  rillnet-signal:
    build:
      context: .
      dockerfile: deployments/docker/signal.Dockerfile
    ports:
      - "8081:8081"
    environment:
      - RILLNET_CONFIG_PATH=/root/configs/config.yaml
      - RILLNET_LOG_LEVEL=debug
      - RILLNET_SIGNAL_ADDRESS=:8081
      - RILLNET_REDIS_ENABLED=true
      - RILLNET_REDIS_ADDRESS=redis:6379
      - RILLNET_JWT_SECRET=dev-docker-compose-secret-change-in-production
      - RILLNET_WEB_SERVER=http://rillnet-web
    volumes:
      - ./configs/config.dev.yaml:/root/configs/config.yaml:ro
    networks:
      - rillnet-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  redis_data:

networks:
  rillnet-network:
    driver: bridge
